                <div class="js_inp">

                    <textarea class="text" placeholder="">function myNomberDepart () {
     let iNombre = Number(document.getElementById("iNombre").value);
     let iCompteur = 0;
     let resultat = ""; 

     while(iCompteur < 10) {
         iNombre ++;
         resultat += iNombre + " ";
         iCompteur ++;
     } 
     document.getElementById("resultat").innerHTML= resultat;
}  </textarea>

         iNombre ++;
         resultat += iNombre + " ";
         iCompteur ++;
     } 
     $("#resultat").html(`(jq) ${resultat}`);
}  </textarea>
